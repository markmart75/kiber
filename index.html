        // Game state
        let currentBlock = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let answeredQuestions = {};

        // Create matrix background
        function createMatrixBg() {
            const bg = document.getElementById('matrixBg');
            const chars = '01 アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            
            for (let i = 0; i < 50; i++) {
                const col = document.createElement('div');
                col.className = 'matrix-column';
                col.style.left = Math.random() * 100 + '%';
                col.style.animationDuration = (Math.random() * 10 + 10) + 's';
                col.style.animationDelay = Math.random() * 10 + 's';
                
                let text = '';
                for (let j = 0; j < 50; j++) {
                    text += chars[Math.floor(Math.random() * chars.length)] + '<br>';
                }
                col.innerHTML = text;
                bg.appendChild(col);
            }
        }

        function showBlocks() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('blockSelector').style.display = 'grid';
            document.getElementById('cardsContainer').innerHTML = '';
        }

        function selectBlock(blockKey, btnElement) {
            currentBlock = blockKey;
            currentQuestionIndex = 0;
            
            // Update active button
            document.querySelectorAll('.block-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (btnElement) btnElement.classList.add('active');
            
            document.getElementById('currentBlock').textContent = gameData[blockKey].name;
            document.getElementById('blockSelector').style.display = 'none';
            
            renderCards();
            updateNavigation();
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            
            const questions = gameData[currentBlock].questions;
            document.getElementById('totalQuestions').textContent = questions.length;
            
            questions.forEach((q, index) => {
                const card = createCard(q, index);
                container.appendChild(card);
            });
            
            updateQuestionCounter();
        }

        function createCard(question, index) {
            const card = document.createElement('div');
            card.className = 'card-container';
            if (index === currentQuestionIndex) card.classList.add('active');
            card.id = `card-${index}`;
            
            const isAnswered = answeredQuestions[`${currentBlock}-${index}`] !== undefined;
            const userAnswer = answeredQuestions[`${currentBlock}-${index}`];
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-number">${String(index + 1).padStart(2, '0')}</div>
                    <div class="card-category">
                        <span class="category-icon">${question.icon}</span>
                        ${question.category}
                    </div>
                </div>
                <div class="scenario-text">${question.scenario.replace(/\n/g, '<br>')}</div>
                <div class="question">${question.question}</div>
                <div class="answers">
                    ${question.answers.map((answer, ansIndex) => {
                        let className = 'answer-btn';
                        if (isAnswered) {
                            className += ' disabled';
                            if (ansIndex === question.correct) className += ' correct';
                            else if (ansIndex === userAnswer && ansIndex !== question.correct) className += ' wrong';
                        }
                        return `<button class="${className}" onclick="checkAnswer(${index}, ${ansIndex})" ${isAnswered ? 'disabled' : ''}>${answer}</button>`;
                    }).join('')}
                </div>
                ${isAnswered ? `
                    <div class="explanation show">
                        <div class="explanation-title">⭐ ${question.explanation}</div>
                        <div class="explanation-text">${question.explanationText.replace(/\n/g, '<br>')}</div>
                        <div class="rule-box">
                            <div class="rule-title">🛡️ ${question.rule}</div>
                        </div>
                    </div>
                ` : ''}
                <div class="circuit-pattern"></div>
            `;
            
            return card;
        }

        function checkAnswer(cardIndex, answerIndex) {
            const question = gameData[currentBlock].questions[cardIndex];
            const key = `${currentBlock}-${cardIndex}`;
            
            if (answeredQuestions[key] !== undefined) return;
            
            answeredQuestions[key] = answerIndex;
            
            if (answerIndex === question.correct) {
                score += 10;
                document.getElementById('score').textContent = score;
            }
            
            // Re-render card
            const card = document.getElementById(`card-${cardIndex}`);
            card.outerHTML = createCard(question, cardIndex).outerHTML;
            
            updateNavigation();
        }

        function nextQuestion() {
            const questions = gameData[currentBlock].questions;
            if (currentQuestionIndex < questions.length - 1) {
                document.getElementById(`card-${currentQuestionIndex}`).classList.remove('active');
                currentQuestionIndex++;
                document.getElementById(`card-${currentQuestionIndex}`).classList.add('active');
                document.getElementById(`card-${currentQuestionIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                updateQuestionCounter();
                updateNavigation();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                document.getElementById(`card-${currentQuestionIndex}`).classList.remove('active');
                currentQuestionIndex--;
                document.getElementById(`card-${currentQuestionIndex}`).classList.add('active');
                document.getElementById(`card-${currentQuestionIndex}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                updateQuestionCounter();
                updateNavigation();
            }
        }

        function updateQuestionCounter() {
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
        }

        function updateNavigation() {
            const questions = gameData[currentBlock].questions;
            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            
            const isLastAnswered = Object.keys(answeredQuestions).filter(k => k.startsWith(currentBlock)).length === questions.length;
            
            if (isLastAnswered && currentQuestionIndex === questions.length - 1) {
                document.getElementById('nextBtn').textContent = 'Завершить ✓';
                document.getElementById('nextBtn').onclick = endGame;
                document.getElementById('nextBtn').disabled = false;
            } else {
                document.getElementById('nextBtn').textContent = 'Вперед →';
                document.getElementById('nextBtn').onclick = nextQuestion;
                document.getElementById('nextBtn').disabled = currentQuestionIndex === questions.length - 1;
            }
        }

        function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            
            const totalQuestions = Object.keys(gameData).reduce((sum, key) => sum + gameData[key].questions.length, 0);
            const percentage = (score / (totalQuestions * 10)) * 100;
            
            let message = '';
            if (percentage >= 90) {
                message = '🏆 ОТЛИЧНО! Ты настоящий эксперт кибербезопасности!';
            } else if (percentage >= 70) {
                message = '👍 ХОРОШО! Ты хорошо разбираешься в цифровой безопасности!';
            } else if (percentage >= 50) {
                message = '⚠️ НЕПЛОХО, но есть куда расти. Изучи правила ещё раз!';
            } else {
                message = '🚨 ВНИМАНИЕ! Тебе нужно серьёзно изучить тему кибербезопасности!';
            }
            
            document.getElementById('resultMessage').textContent = message;
        }

        function restartGame() {
            currentBlock = null;
            currentQuestionIndex = 0;
            score = 0;
            answeredQuestions = {};
            
            document.getElementById('score').textContent = '0';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('blockSelector').style.display = 'none';
        }

        // Initialize
        window.onload = function() {
            createMatrixBg();
        };
    </script>
